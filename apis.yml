aid: transfix
name: Transfix
description: >-
  Transfix is a New York-based freight technology company that, since
  divesting its brokerage operation to NFI Industries in June 2024,
  operates as a SaaS and data company providing AI-powered Transportation
  Management System (TMS) software to freight brokers, third-party
  logistics providers (3PLs), shippers, and carriers across the United
  States. The Transfix TMS unifies pricing, planning, execution, and
  billing in a single platform, with feature areas covering Smart
  Pricing and Quoting, RFP Management and Collaboration, Coverage and
  Carrier Management, Streamlined Scheduling, Operations and Automation,
  Invoicing and Payments, and Reporting and Insights. Core AI
  capabilities include the Custom Rate Prediction Suite for spot and
  contract pricing across Dry Van, Reefer, and Flatbed equipment, and
  the RFP Workflow with a Smart Upload feature that structures bid data
  from heterogeneous file formats. Transfix markets integrations with
  existing TMS, carrier networks, and data sources, and references
  freight API integrations in marketing material, but does not publish
  a public developer portal, API reference, OpenAPI specification,
  SDKs, or open-source repositories. NFI Industries is the platform's
  anchor third-party customer following the brokerage divestiture.
